name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          # Pillow is used by scripts/build-html-lookbook.py for thumbnail
          # resize + og.jpg generation. pytest is the only test runner.
          pip install Pillow pytest

      - name: Validate clawhub.json + SKILL.md frontmatter
        run: |
          # Lockstep version invariant: clawhub.json#version must match
          # SKILL.md's frontmatter version: line.
          python -c "
          import json, re, pathlib, sys
          manifest = json.loads(pathlib.Path('clawhub.json').read_text())
          frontmatter = re.match(r'^---\n(.*?)\n---', pathlib.Path('SKILL.md').read_text(), re.DOTALL).group(1)
          fm_version = re.search(r'^version:\s*([0-9.]+)\s*$', frontmatter, re.M).group(1)
          assert manifest['version'] == fm_version, (
              f'lockstep mismatch: clawhub.json={manifest[\"version\"]!r} '
              f'vs SKILL.md frontmatter={fm_version!r}'
          )
          print(f'✓ versions in lockstep: {fm_version}')
          "

      - name: Confirm scripts compile
        run: |
          python -m py_compile scripts/*.py scripts/lib/*.py
          bash -n scripts/deploy-lookbook.sh

      - name: Run pytest
        env:
          # Tests in tests/test_verify_face.py mock the OpenAI API via a local
          # HTTP server, so no real key is needed; we set a stub to satisfy
          # the script's "must start with sk-" precondition.
          OPENAI_API_KEY: sk-test-stub-not-real-do-not-use
        run: |
          python -m pytest tests/ -v --tb=short

  scripts-help:
    # Sanity-check that every bundled script's --help renders without error.
    # Catches argparse breakage and bash syntax issues independent of unit
    # tests. The scripts lazy-import optional deps (e.g. Pillow), so --help
    # works without them — but install Pillow anyway as a belt-and-suspenders
    # check that import-time dependencies stay clean.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime deps so --help imports succeed
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Confirm --help on every script
        run: |
          set -e
          for s in scripts/*.py; do
            echo "=== $s --help ==="
            python "$s" --help > /dev/null
          done
          echo "=== scripts/deploy-lookbook.sh --help ==="
          bash scripts/deploy-lookbook.sh --help > /dev/null
